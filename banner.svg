<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7b2ff7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff2d55;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)" rx="12" />

  <!-- Grid pattern overlay -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40" /><line x1="0" y1="80" x2="1200" y2="80" />
    <line x1="0" y1="120" x2="1200" y2="120" /><line x1="0" y1="160" x2="1200" y2="160" />
    <line x1="0" y1="200" x2="1200" y2="200" /><line x1="0" y1="240" x2="1200" y2="240" />
    <line x1="0" y1="280" x2="1200" y2="280" />
    <line x1="100" y1="0" x2="100" y2="320" /><line x1="200" y1="0" x2="200" y2="320" />
    <line x1="300" y1="0" x2="300" y2="320" /><line x1="400" y1="0" x2="400" y2="320" />
    <line x1="500" y1="0" x2="500" y2="320" /><line x1="600" y1="0" x2="600" y2="320" />
    <line x1="700" y1="0" x2="700" y2="320" /><line x1="800" y1="0" x2="800" y2="320" />
    <line x1="900" y1="0" x2="900" y2="320" /><line x1="1000" y1="0" x2="1000" y2="320" />
    <line x1="1100" y1="0" x2="1100" y2="320" />
  </g>

  <!-- Decorative circuit nodes -->
  <g opacity="0.08" fill="#00d2ff">
    <circle cx="150" cy="60" r="3" /><circle cx="350" cy="90" r="2" />
    <circle cx="850" cy="50" r="3" /><circle cx="1050" cy="80" r="2" />
    <circle cx="200" cy="270" r="2" /><circle cx="950" cy="260" r="3" />
    <circle cx="750" cy="280" r="2" /><circle cx="450" cy="55" r="2" />
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentGrad)" rx="1" />

  <!-- Shield icon -->
  <g transform="translate(100, 85)" filter="url(#glow)">
    <path d="M60 0 L120 25 L120 70 C120 110 90 140 60 155 C30 140 0 110 0 70 L0 25 Z"
          fill="none" stroke="url(#shieldGrad)" stroke-width="3" opacity="0.9" />
    <path d="M60 15 L108 35 L108 70 C108 102 84 128 60 140 C36 128 12 102 12 70 L12 35 Z"
          fill="url(#shieldGrad)" opacity="0.12" />
    <!-- Checkmark inside shield -->
    <path d="M38 72 L54 88 L84 55" fill="none" stroke="#00d2ff" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
    <!-- Scan radar rings -->
    <circle cx="60" cy="75" r="30" fill="none" stroke="#00d2ff" stroke-width="0.8" opacity="0.3" />
    <circle cx="60" cy="75" r="45" fill="none" stroke="#7b2ff7" stroke-width="0.5" opacity="0.2" />
    <circle cx="60" cy="75" r="60" fill="none" stroke="#ff2d55" stroke-width="0.3" opacity="0.1" />
  </g>

  <!-- Main title -->
  <text x="260" y="145" font-family="Segoe UI, Arial, sans-serif" font-size="44"
        font-weight="700" fill="#ffffff" letter-spacing="2">VULNERABILITY</text>
  <text x="710" y="145" font-family="Segoe UI, Arial, sans-serif" font-size="44"
        font-weight="300" fill="#00d2ff" letter-spacing="2">MANAGEMENT</text>

  <!-- Subtitle -->
  <text x="262" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="17"
        fill="#8892b0" letter-spacing="5" font-weight="400">COMPREHENSIVE ACTIVE VULNERABILITY SCANNER</text>

  <!-- Version badge -->
  <g transform="translate(262, 200)">
    <rect width="64" height="24" rx="4" fill="#7b2ff7" opacity="0.25" stroke="#7b2ff7" stroke-width="1" />
    <text x="32" y="16" font-family="Segoe UI, monospace" font-size="11"
          fill="#c4b5fd" text-anchor="middle" font-weight="600">v1.0.0</text>
  </g>
  <g transform="translate(336, 200)">
    <rect width="80" height="24" rx="4" fill="#00d2ff" opacity="0.15" stroke="#00d2ff" stroke-width="1" />
    <text x="40" y="16" font-family="Segoe UI, monospace" font-size="11"
          fill="#67e8f9" text-anchor="middle" font-weight="600">Python 3.9+</text>
  </g>
  <g transform="translate(426, 200)">
    <rect width="68" height="24" rx="4" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1" />
    <text x="34" y="16" font-family="Segoe UI, monospace" font-size="11"
          fill="#6ee7b7" text-anchor="middle" font-weight="600">MIT</text>
  </g>

  <!-- Platform icons row -->
  <g transform="translate(262, 245)" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" fill="#64748b">
    <g>
      <rect width="82" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8" />
      <text x="41" y="18" text-anchor="middle" fill="#94a3b8">Windows</text>
    </g>
    <g transform="translate(92, 0)">
      <rect width="65" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8" />
      <text x="33" y="18" text-anchor="middle" fill="#94a3b8">Linux</text>
    </g>
    <g transform="translate(167, 0)">
      <rect width="65" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8" />
      <text x="33" y="18" text-anchor="middle" fill="#94a3b8">Cisco</text>
    </g>
    <g transform="translate(242, 0)">
      <rect width="100" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8" />
      <text x="50" y="18" text-anchor="middle" fill="#94a3b8">Web Servers</text>
    </g>
    <g transform="translate(352, 0)">
      <rect width="100" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8" />
      <text x="50" y="18" text-anchor="middle" fill="#94a3b8">Middleware</text>
    </g>
    <g transform="translate(462, 0)">
      <rect width="95" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8" />
      <text x="48" y="18" text-anchor="middle" fill="#94a3b8">Databases</text>
    </g>
  </g>

  <!-- Right side: stats column -->
  <g transform="translate(900, 95)" font-family="Segoe UI, monospace" opacity="0.6">
    <text x="0" y="0" font-size="12" fill="#00d2ff">~800 </text>
    <text x="55" y="0" font-size="12" fill="#64748b">Security Rules</text>
    <text x="0" y="24" font-size="12" fill="#ff2d55">32,000+</text>
    <text x="65" y="24" font-size="12" fill="#64748b">CVEs (NVD)</text>
    <text x="0" y="48" font-size="12" fill="#f59e0b">1,100+</text>
    <text x="55" y="48" font-size="12" fill="#64748b">CISA KEV</text>
    <text x="0" y="72" font-size="12" fill="#10b981">23</text>
    <text x="30" y="72" font-size="12" fill="#64748b">Platforms</text>
    <text x="0" y="96" font-size="12" fill="#a78bfa">6</text>
    <text x="20" y="96" font-size="12" fill="#64748b">CIS Benchmarks</text>
    <text x="0" y="120" font-size="12" fill="#f472b6">21</text>
    <text x="30" y="120" font-size="12" fill="#64748b">Check Modules</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="317" width="1200" height="3" fill="url(#accentGrad)" rx="1" />
</svg>
